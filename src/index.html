<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="assets//img/mangalyx.png" />

    <title>Mangalyx</title>

    <link rel="stylesheet" href="styles/output.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="">
    <!-- Splash Screen -->
    <div
      id="splash-screen"
      class="fixed inset-0 h-screen w-full flex items-center justify-center bg-black z-50"
    >
      <img
        src="assets/img/mangalyx-logo.png"
        alt="Mangalyx splash screen logo"
      />
    </div>
    <!-- End of splashscreen -->
    <!-- Header -->
    <header>
      <div class="hero-content h-[300px] relative">
        <div
          class="flex w-[90%] m-auto h-[40px] items-center gap-2 px-[10px] rounded-[30px] bg-white bg-opacity-20 backdrop-blur-sm mt-[5px] absolute top-1 left-1/2 transform -translate-x-1/2 z-10"
        >
          <label for="search"><i class="bi bi-search"></i></label>
          <input
            type="search"
            name=""
            id=""
            placeholder="Search"
            class="w-[100%] h-[40px] bg-transparent focus:outline-none placeholder:text-gray-800 placeholder:font-inter placeholder:text-[14px] placeholder:font-medium text-black font-inter text-[14px] font-medium"
          />
        </div>
        <div class="carousel relative overflow-hidden h-[300px] w-full">
          <div
            class="carousel-inner flex transition-transform duration-500 ease-in-out"
            id="carousel-inner"
          ></div>
          <div
            class="carousel-indicators absolute bottom-4 left-[85%] transform -translate-x-1/2 flex space-x-2"
          >
            <button
              class="carousel-indicator w-2 h-2 rounded-full bg-black bg-opacity-50 hover:bg-opacity-75 transition-all"
              data-slide="0"
            ></button>
            <button
              class="carousel-indicator w-2 h-2 rounded-full bg-black bg-opacity-50 hover:bg-opacity-75 transition-all"
              data-slide="1"
            ></button>
            <button
              class="carousel-indicator w-2 h-2 rounded-full bg-black bg-opacity-50 hover:bg-opacity-75 transition-all"
              data-slide="2"
            ></button>
            <button
              class="carousel-indicator w-2 h-2 rounded-full bg-black bg-opacity-50 hover:bg-opacity-75 transition-all"
              data-slide="3"
            ></button>
            <button
              class="carousel-indicator w-2 h-2 rounded-full bg-black bg-opacity-50 hover:bg-opacity-75 transition-all"
              data-slide="4"
            ></button>
          </div>
        </div>
      </div>
    </header>
    <!-- End of header -->
    <!-- trending manga -->
    <section class="flex flex-col">
      <div class="trending py-4 w-[95%] m-auto">
        <div class="flex justify-between items-center py-2">
          <h1 class="rated1 text-[18px] font-bold mb-[10px] font-orbitron">
            Trending Manga
          </h1>
          <a
            href="trending-page.html"
            class="flex items-center gap-1 text-gray-500"
          >
            <i class="bi bi-chevron-right"></i>
          </a>
        </div>
        <div
          id="trendin-manga-container"
          class="trending-manga w-full flex gap-2 overflow-x-auto no-scrollbar border"
        ></div>
      </div>
    </section>
    <!--End of trending manga -->
    <!-- Top rated -->
    <section>
      <div class="top-rated py-4 w-[95%] m-auto">
        <div class="flex justify-between items-center py-2">
          <h1 class="rated text-[18px] font-bold mb-[10px] font-orbitron">
            Top Rated
          </h1>
          <a
            href="trending-page.html"
            class="flex items-center gap-1 text-gray-500"
          >
            <i class="bi bi-chevron-right"></i>
          </a>
        </div>
        <div
          class="top-rated-manga w-full flex gap-2 overflow-x-auto no-scrollbar border"
          id="top-rated-manga"
        ></div>
      </div>
    </section>
  </body>
</html>
<script src="javascript/app.js"></script>
<script src="javascript/index.js"></script>
